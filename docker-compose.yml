services:
  # ────────────────────────────────────────────
  # Infrastructure
  # ────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: iam_app
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: iam
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam_app -d iam"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "*"
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s

  # One-shot: create required Kafka topics
  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo '→ Creating Kafka topics...' &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic iam.audit              --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic iam.permission.changed --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic iam.user.changed       --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic iam.role.changed       --partitions 3 --replication-factor 1 &&
      echo '✓ Kafka topics ready.'
      "
    restart: "no"

  # ────────────────────────────────────────────
  # DB Init — migrations + seeding (one-shot)
  # ────────────────────────────────────────────
  db-init:
    build:
      context: .
      target: runner
    command: >
      sh -c "
        echo '→ Running TypeORM migrations...' &&
        npx ts-node -r tsconfig-paths/register ./node_modules/typeorm/cli.js migration:run -d src/database/data-source.ts &&
        echo '→ Seeding database...' &&
        npm run seed &&
        echo '✓ Database ready.'
      "
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    restart: on-failure

  # ────────────────────────────────────────────
  # Application Services
  # ────────────────────────────────────────────

  iam:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    env_file:
      - .env.docker
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/v1/health/live 2>/dev/null || exit 1",
        ]
      interval: 90s
      timeout: 10s
      retries: 10
      start_period: 30s

  iam-showcase:
    build:
      context: .
      dockerfile: iam-showcase/Dockerfile
    restart: unless-stopped
    ports:
      - "3010:3010"
    depends_on:
      iam:
        condition: service_healthy
    env_file:
      - .env.docker
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3010/health 2>/dev/null || exit 1"]
      interval: 90s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
  redis_data:
